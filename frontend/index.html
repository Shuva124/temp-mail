<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary Email Service</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <h1>TempMail</h1>
            </div>
        </header>

        <main class="container">
            <section id="landing-view" class="view active">
                <div class="landing-content">
                    <h2>Secure, Temporary Email Address</h2>
                    <p>Protect your personal email from spam, bots, and phishing with a disposable address.</p>
                    <button id="generate-btn" class="btn btn-primary btn-large">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Generate Email
                    </button>
                </div>
            </section>

            <section id="dashboard-view" class="view hidden">
                <div class="control-panel">
                    <div class="email-display-group">
                        <input type="text" id="email-address" readonly value="loading...">
                        <button id="copy-btn" class="btn btn-icon" title="Copy to clipboard">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                    <div class="actions-group">
                        <div class="timer-badge">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                            <span id="countdown">Expires in: --:--</span>
                        </div>
                        <button id="change-email-btn" class="btn btn-outline">Change Address</button>
                    </div>
                </div>

                <div class="inbox-layout">
                    <aside class="inbox-sidebar">
                        <div class="inbox-header">
                            <h3>Inbox</h3>
                            <button id="refresh-btn" class="btn btn-icon" title="Refresh">
                                <svg id="refresh-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                            </button>
                        </div>
                        <div id="email-list" class="email-list">
                        </div>
                    </aside>

                    <article class="email-detail">
                        <div id="email-content" class="email-content empty-state">
                            <svg viewBox="0 0 24 24" width="48" height="48" stroke="var(--purple-light)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <p>Select an email to read</p>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
